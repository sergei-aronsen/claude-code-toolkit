<section id="mcp-{{NAME}}" class="not-installed">
  <h2><span class="section-icon">🔌</span> {{DISPLAY_NAME}} <span class="section-tag muted">not installed</span></h2>
  <p class="section-subtitle">{{DESCRIPTION}}</p>

  <h3>Install</h3>
  <div class="codeblock"><button class="copy-btn">📋 copy</button><pre><code>claude mcp add {{INSTALL_CMD}}</code></pre></div>

  <p>{{POST_INSTALL_NOTE}}</p>
</section>
