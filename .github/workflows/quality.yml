name: Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Audit M7: cancel redundant runs on the same ref (e.g., PR force-pushes)
# so we don't waste minutes on superseded commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: './scripts'
          severity: warning

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: '**/*.md'
          config: '.markdownlint-cli2.jsonc'

  validate-templates:
    name: Validate Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check required sections in audit files
        run: |
          echo "Checking audit files for required sections..."
          ERRORS=0

          while IFS= read -r f; do
            if ! grep -q "QUICK CHECK" "$f"; then
              echo "❌ Missing QUICK CHECK: $f"
              ERRORS=$((ERRORS + 1))
            fi
            if ! grep -q "САМОПРОВЕРКА\|SELF-CHECK" "$f"; then
              echo "❌ Missing SELF-CHECK section: $f"
              ERRORS=$((ERRORS + 1))
            fi
            if ! grep -q "ФОРМАТ ОТЧЁТА\|OUTPUT FORMAT" "$f"; then
              echo "❌ Missing REPORT FORMAT: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find templates -path '*/prompts/*.md' \( \
            -name 'SECURITY_AUDIT.md' -o \
            -name 'PERFORMANCE_AUDIT.md' -o \
            -name 'CODE_REVIEW.md' -o \
            -name 'DEPLOY_CHECKLIST.md' \))

          if [ $ERRORS -gt 0 ]; then
            echo "Found $ERRORS errors"
            exit 1
          fi
          echo "✅ All audit templates valid"

      - name: Check v4.2 pipeline markers in all 49 prompt files
        run: |
          echo "Checking v4.2 audit pipeline markers (Council Handoff + FP-recheck step 1)..."
          ERRORS=0

          while IFS= read -r f; do
            if ! grep -qF 'Council Handoff' "$f"; then
              echo "❌ Missing 'Council Handoff' marker: $f"
              ERRORS=$((ERRORS + 1))
            fi
            if ! grep -qF '1. **Read context**' "$f"; then
              echo "❌ Missing '1. **Read context**' marker: $f"
              ERRORS=$((ERRORS + 1))
            fi
            if ! grep -qF '6. **Severity sanity check**' "$f"; then
              echo "❌ Missing '6. **Severity sanity check**' marker: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find templates -path '*/prompts/*.md' \( \
            -name 'SECURITY_AUDIT.md' -o \
            -name 'CODE_REVIEW.md' -o \
            -name 'PERFORMANCE_AUDIT.md' -o \
            -name 'MYSQL_PERFORMANCE_AUDIT.md' -o \
            -name 'POSTGRES_PERFORMANCE_AUDIT.md' -o \
            -name 'DEPLOY_CHECKLIST.md' -o \
            -name 'DESIGN_REVIEW.md' \))

          if [ $ERRORS -gt 0 ]; then
            echo "Found $ERRORS v4.2 marker errors across audit prompts"
            exit 1
          fi
          echo "✅ All 49 prompt files carry v4.2 pipeline markers (TEMPLATE-03)"

      - name: Test 20 — template propagation idempotency
        run: bash scripts/tests/test-template-propagation.sh

      - name: Tests 21-34 — uninstall + banner suite + bootstrap + lib coverage + TUI orchestrator + MCP selector + Skills selector + bridges aggregate (UN-01..UN-08, BOOTSTRAP-01..04, LIB-01..02, BANNER-01, KEEP-01..02, TUI-01..09, MCP-01..05, MCP-SEC-01..02, SKILL-03..05, BRIDGE-TEST-01)
        run: |
          bash scripts/tests/test-uninstall-dry-run.sh
          bash scripts/tests/test-uninstall-backup.sh
          bash scripts/tests/test-uninstall-prompt.sh
          bash scripts/tests/test-uninstall.sh
          bash scripts/tests/test-install-banner.sh
          bash scripts/tests/test-uninstall-idempotency.sh
          bash scripts/tests/test-uninstall-state-cleanup.sh
          bash scripts/tests/test-bootstrap.sh
          bash scripts/tests/test-update-libs.sh
          bash scripts/tests/test-uninstall-keep-state.sh
          bash scripts/tests/test-install-tui.sh
          bash scripts/tests/test-mcp-selector.sh
          bash scripts/tests/test-install-skills.sh
          bash scripts/tests/test-bridges.sh

      - name: HARDEN-A-01 — validate commands/*.md required headings
        run: make validate-commands

      - name: DESK-02/DESK-04 — Skills Desktop-safety audit (>= 4 PASS threshold)
        run: make validate-skills-desktop

      - name: MKT-03 — marketplace structural smoke (skipped without TK_HAS_CLAUDE_CLI)
        run: make validate-marketplace

      - name: REL-02 — cell-parity (all 3 surfaces carry all 13 cell names)
        run: make cell-parity

  test-init-script:
    # Audit T-05: matrix across Linux + macOS so BSD-vs-GNU divergence in
    # head/sed/awk/cp/find is caught in CI instead of surfacing in user installs.
    name: Test Init Script
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Test Laravel detection
        run: |
          cd /tmp
          touch artisan
          bash "$GITHUB_WORKSPACE/scripts/init-local.sh"
          test -f .claude/prompts/SECURITY_AUDIT.md || exit 1
          echo "✅ Laravel init works"

      - name: Test Next.js detection
        run: |
          cd /tmp
          rm -rf .claude CLAUDE.md artisan
          touch next.config.js
          bash "$GITHUB_WORKSPACE/scripts/init-local.sh"
          test -f .claude/prompts/SECURITY_AUDIT.md || exit 1
          echo "✅ Next.js init works"

  test-matrix-bats:
    name: Test Matrix (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Upgrade cells run `git worktree add` at PRE_40_COMMIT
          # (scripts/tests/matrix/lib/helpers.bash:18). Shallow checkout
          # lacks that commit, causing 4 -upgrade tests to abort silently.
          fetch-depth: 0

      - name: Install bats-core
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # v4.0.0

      - name: Run matrix bats suite
        run: make test-matrix-bats
