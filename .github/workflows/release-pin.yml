name: Auto-pin vendors on release tag

# Trigger on tag push OR GitHub Release published OR manual dispatch.
# `release.published` is the most reliable trigger when releases are created
# via `gh release create` (which is the maintainer's release flow). The
# `push.tags` trigger is kept for direct `git push --tags` workflows.
# Empirically, `on: push: tags:` alone produced 0-job startup-failures on
# multiple recent commits — likely interaction with branch pushes that
# share a head commit with the tag. The job-level `if:` guard ensures
# pin-vendors only runs for tag refs regardless of which event fired.
on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to pin vendors at (e.g. v6.3.0). Defaults to current ref.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  # Use `head_ref` (always set) or fall back to a static value to avoid
  # slash-containing concurrency group names when ref is `refs/tags/...`.
  group: release-pin-${{ github.event.release.tag_name || github.ref_name || 'manual' }}
  cancel-in-progress: false

jobs:
  pin-vendors:
    # Skip on push events that aren't tags (defensive — `on.push.tags` should
    # already filter, but the empirical 0-job failures suggest GH treats
    # branch-push + new-workflow-file edge cases inconsistently).
    if: |
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    env:
      # Avoid using ${{ github.* }} directly in run scripts (workflow
      # injection guard). Surface the values via env vars first; run
      # scripts read $TAG / $REF.
      TAG: ${{ github.event.release.tag_name || github.ref_name }}
      REF: ${{ github.ref }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — pinned to match quality.yml
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanity check tools
        run: |
          jq --version
          git --version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone pinned vendors
        run: |
          chmod +x scripts/vendor/clone-pinned.sh
          scripts/vendor/clone-pinned.sh manifest.json _external

      - name: Pin vendors at HEAD
        run: |
          chmod +x scripts/vendor/pin-vendors.sh
          scripts/vendor/pin-vendors.sh manifest.json _external

      - name: Validate manifest still parses
        run: |
          jq -e . manifest.json > /dev/null

      - name: Detect changes
        id: detect
        run: |
          if git diff --quiet manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No vendor pin changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Vendor pin changes detected."
            git diff manifest.json | head -50
          fi

      - name: Commit pin updates
        if: steps.detect.outputs.changed == 'true'
        run: |
          # Use $TAG (env var) — never interpolate ${{ }} in run script
          branch="chore/pin-vendors-${TAG}"
          git checkout -B "$branch"
          git add manifest.json
          git commit -m "chore(release): pin vendor refs at ${TAG}

          Auto-generated by .github/workflows/release-pin.yml — captures
          HEAD commit + tag of every external vendor at the moment of
          ${TAG} release. /vendor-changelog uses these pins as the diff
          baseline for the next quarter's analysis."

      - name: Push pin commit
        if: steps.detect.outputs.changed == 'true'
        run: |
          branch="chore/pin-vendors-${TAG}"
          git push origin "$branch"
          echo "Push complete. Maintainer should open PR from $branch to main."
