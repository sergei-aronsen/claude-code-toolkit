name: Auto-pin vendors on release tag

# Trigger on GitHub Release published OR manual dispatch.
#
# History: this workflow previously had `on: push: tags: ['v*']`. Empirically
# that filter did not restrict to tag pushes — every regular branch push fired
# the workflow, the job-level `if:` guard skipped the only job, and GitHub
# reported "0 successful jobs" as workflow failure. Result: a red Action run
# email per branch push (per PR, per merge, per CI iteration). The release
# pin path itself was never reached on those pushes, so removing the
# `push.tags` trigger does not lose functionality:
#   - The maintainer's release flow uses `gh release create vX.Y.Z`, which
#     fires `release.published` → workflow runs against the tagged commit.
#   - For direct `git push --tags` without creating a Release, run
#     `workflow_dispatch` with the desired tag instead.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to pin vendors at (e.g. v6.3.0). Defaults to current ref.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  # Group on tag name only (release event always carries it; manual dispatch
  # may not — fall back to 'manual'). No more push events here, so no more
  # slash-bearing branch refs to worry about.
  group: release-pin-${{ github.event.release.tag_name || inputs.tag || 'manual' }}
  cancel-in-progress: false

jobs:
  pin-vendors:
    runs-on: ubuntu-latest
    env:
      # Avoid using ${{ github.* }} directly in run scripts (workflow
      # injection guard). Surface the values via env vars first; run
      # scripts read $TAG / $REF. Resolution order:
      #   1. release.published    → release.tag_name
      #   2. workflow_dispatch    → inputs.tag if user supplied one
      #   3. workflow_dispatch    → ref_name (the branch the dispatch ran on)
      TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
      REF: ${{ github.ref }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2 — pinned to match quality.yml
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanity check tools
        run: |
          jq --version
          git --version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone pinned vendors
        run: |
          chmod +x scripts/vendor/clone-pinned.sh
          scripts/vendor/clone-pinned.sh manifest.json _external

      - name: Pin vendors at HEAD
        run: |
          chmod +x scripts/vendor/pin-vendors.sh
          scripts/vendor/pin-vendors.sh manifest.json _external

      - name: Validate manifest still parses
        run: |
          jq -e . manifest.json > /dev/null

      - name: Detect changes
        id: detect
        run: |
          if git diff --quiet manifest.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No vendor pin changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Vendor pin changes detected."
            git diff manifest.json | head -50
          fi

      - name: Commit pin updates
        if: steps.detect.outputs.changed == 'true'
        run: |
          # Use $TAG (env var) — never interpolate ${{ }} in run script
          branch="chore/pin-vendors-${TAG}"
          git checkout -B "$branch"
          git add manifest.json
          git commit -m "chore(release): pin vendor refs at ${TAG}

          Auto-generated by .github/workflows/release-pin.yml — captures
          HEAD commit + tag of every external vendor at the moment of
          ${TAG} release. /vendor-changelog uses these pins as the diff
          baseline for the next quarter's analysis."

      - name: Push pin commit
        if: steps.detect.outputs.changed == 'true'
        run: |
          branch="chore/pin-vendors-${TAG}"
          git push origin "$branch"
          echo "Push complete. Maintainer should open PR from $branch to main."
