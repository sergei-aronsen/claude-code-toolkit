version: 2
updates:

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"

  - package-ecosystem: "pip"
    directory: "/templates/skills-marketplace/memo-skill"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(templates/skills-marketplace/memo-skill)"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/templates/skills-marketplace/notebooklm"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(templates/skills-marketplace/notebooklm)"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
